<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 512 512"
  fill="none"
  role="img"
  aria-label="Sync"
>
  <!--
    Branding · "Sync" · cloud + dos flechas-engranaje
    @UIUX spec:
      - Cloud body en cyan/sky (similar al referente).
      - 2 medias lunas (arcos circulares) con punta de flecha que
        sugieren rotación constante. Pequeños teeth radiales en el
        borde externo evocan engranajes.
      - Legible a 24x24 (sidebar logo) y 192x192 (PWA).
  -->
  <defs>
    <linearGradient id="cloud-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#67d6f8" />
      <stop offset="100%" stop-color="#1aa6e8" />
    </linearGradient>
  </defs>

  <!-- Nube -->
  <path
    fill="url(#cloud-grad)"
    d="M388 198a96 96 0 0 0-184-24 84 84 0 0 0-108 100 96 96 0 0 0 26 186h274a98 98 0 0 0 12-194 90 90 0 0 0-20-68z"
  />

  <!-- Anillos engranaje · teeth radiales sutiles centrados en (256,266) -->
  <g fill="#ffffff" opacity="0.95">
    <!-- Teeth ring exterior · 12 teeth distribuidos cada 30° en r=88..96 -->
    <rect x="252" y="170" width="8" height="14" rx="1" />
    <rect x="252" y="170" width="8" height="14" rx="1" transform="rotate(30 256 266)" />
    <rect x="252" y="170" width="8" height="14" rx="1" transform="rotate(60 256 266)" />
    <rect x="252" y="170" width="8" height="14" rx="1" transform="rotate(90 256 266)" />
    <rect x="252" y="170" width="8" height="14" rx="1" transform="rotate(120 256 266)" />
    <rect x="252" y="170" width="8" height="14" rx="1" transform="rotate(150 256 266)" />
    <rect x="252" y="170" width="8" height="14" rx="1" transform="rotate(180 256 266)" />
    <rect x="252" y="170" width="8" height="14" rx="1" transform="rotate(210 256 266)" />
    <rect x="252" y="170" width="8" height="14" rx="1" transform="rotate(240 256 266)" />
    <rect x="252" y="170" width="8" height="14" rx="1" transform="rotate(270 256 266)" />
    <rect x="252" y="170" width="8" height="14" rx="1" transform="rotate(300 256 266)" />
    <rect x="252" y="170" width="8" height="14" rx="1" transform="rotate(330 256 266)" />
  </g>

  <!--
    Dos medias-luna arrows que se persiguen en sentido horario.
    Hechos como anillos parciales con stroke + arrow head triangular.
    - Arco superior: de 200° a 340° (gira hacia abajo-derecha)
    - Arco inferior: de 20° a 160° (gira hacia arriba-izquierda)
  -->
  <g fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round">
    <!-- Arco superior (medio anillo izquierdo→derecho por arriba) -->
    <path d="M 188 246 A 78 78 0 0 1 318 218" />
    <!-- Arco inferior (medio anillo derecho→izquierdo por abajo) -->
    <path d="M 324 286 A 78 78 0 0 1 194 314" />
  </g>

  <!-- Puntas de flecha (triángulos) en los extremos de cada arco -->
  <g fill="#ffffff">
    <!-- Punta del arco superior (apunta hacia abajo-derecha) -->
    <path d="M 318 218 L 308 200 L 338 206 Z" />
    <!-- Punta del arco inferior (apunta hacia arriba-izquierda) -->
    <path d="M 194 314 L 204 332 L 174 326 Z" />
  </g>
</svg>
