<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>Sync · Tableau Web Data Connector</title>
  <!--
    Wave R3.0 Fase 4 · Equipo P21-B · Tableau Web Data Connector v3.
    Standalone HTML cargado por Tableau Desktop vía:
      Connect → To a Server → Web Data Connector → URL: https://<host>/wdc/sync-tableau.html

    Flujo:
      1. El usuario pega su API key Bearer (scope `read:exports`) + elige dataset.
      2. Click "Get Data" guarda `{ apiKey, dataset, baseUrl }` en
         `tableau.connectionData` y llama `tableau.submit()`.
      3. Tableau recarga el HTML headless en modo "schema" y luego "data",
         invocando `myConnector.getSchema(...)` y `myConnector.getData(...)`.
      4. `getData` itera fetch del endpoint REST con paginación cursor-based
         hasta `nextCursor === null` o cap de seguridad alcanzado.

    Trade-off: WDC vs Hyper API → WDC simplifica deployment (sólo HTML
    estático servido bajo /public/wdc) y no requiere Tableau Server. La
    contraparte es cap de 5000 filas por request — mitigado con paginación
    automática transparente al usuario.
  -->
  <script src="https://connectors.tableau.com/libs/tableauwdc-2.3.latest.js"
          type="text/javascript"></script>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --border: #d1d5db;
      --error: #b91c1c;
      --success: #047857;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      margin: 0;
      padding: 24px;
      max-width: 540px;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 4px 0;
    }
    p.subtitle {
      margin: 0 0 20px 0;
      color: var(--muted);
      font-size: 13px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--fg);
    }
    .field { margin-bottom: 16px; }
    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
      color: var(--fg);
      font-family: inherit;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }
    button {
      width: 100%;
      padding: 10px;
      background: var(--primary);
      color: white;
      border: 0;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: var(--primary-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }
    .status {
      margin-top: 16px;
      padding: 10px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    .status.error {
      display: block;
      background: #fee2e2;
      color: var(--error);
      border: 1px solid #fecaca;
    }
    .status.ok {
      display: block;
      background: #d1fae5;
      color: var(--success);
      border: 1px solid #a7f3d0;
    }
  </style>
</head>
<body>
  <h1>Sync · Tableau Connector</h1>
  <p class="subtitle">
    FollowupGantt · selecciona un dataset y autentica con API key
    (scope <code>read:exports</code>).
  </p>

  <div class="field">
    <label for="apiKey">API Key (Bearer)</label>
    <input type="password" id="apiKey" placeholder="sk_xxxxxxxx_xxxxxxxx" autocomplete="off" />
    <div class="hint">
      Generala en <code>/admin/api-keys</code> con scope
      <code>read:exports</code>.
    </div>
  </div>

  <div class="field">
    <label for="dataset">Dataset</label>
    <select id="dataset">
      <option value="projects">Projects — proyectos del workspace</option>
      <option value="tasks">Tasks — tareas con projectName</option>
      <option value="sprints">Sprints — sprints con state derivado</option>
      <option value="risks">Risks — riesgos con score + severity</option>
      <option value="audit">Audit — eventos últimos 90 días</option>
    </select>
  </div>

  <div class="field">
    <label for="baseUrl">Base URL (avanzado)</label>
    <input type="text" id="baseUrl" placeholder="https://sync.avante.com" />
    <div class="hint">
      Auto-detectado si dejas vacío. Modifícalo para apuntar a staging.
    </div>
  </div>

  <button id="submitButton" type="button">Get Data</button>
  <div id="status" class="status"></div>

  <script type="text/javascript">
    (function () {
      'use strict';
      // ─────────────────────────────────────────────────────────────
      // Schemas de columnas. DEBE matchear shape JSON real devuelto por
      // /api/integrations/tableau/<dataset>. Si cambias columnas allá,
      // actualízalas aquí. El endpoint /schema/<dataset> sirve la misma
      // metadata como source-of-truth para validación opcional.
      // ─────────────────────────────────────────────────────────────
      var DATASET_SCHEMAS = {
        projects: {
          alias: 'Sync Projects',
          columns: [
            { id: 'id', alias: 'Project ID', dataType: 'string' },
            { id: 'name', alias: 'Name', dataType: 'string' },
            { id: 'status', alias: 'Status', dataType: 'string' },
            { id: 'methodology', alias: 'Methodology', dataType: 'string' },
            { id: 'manager', alias: 'Manager', dataType: 'string' },
            { id: 'gerencia', alias: 'Gerencia', dataType: 'string' },
            { id: 'area', alias: 'Area', dataType: 'string' },
            { id: 'budget', alias: 'Budget', dataType: 'float' },
            { id: 'budgetCurrency', alias: 'Currency', dataType: 'string' },
            { id: 'cpi', alias: 'CPI', dataType: 'float' },
            { id: 'spi', alias: 'SPI', dataType: 'float' },
            { id: 'startDate', alias: 'Start Date', dataType: 'datetime' },
            { id: 'endDate', alias: 'End Date', dataType: 'datetime' },
            { id: 'createdAt', alias: 'Created At', dataType: 'datetime' },
            { id: 'updatedAt', alias: 'Updated At', dataType: 'datetime' }
          ]
        },
        tasks: {
          alias: 'Sync Tasks',
          columns: [
            { id: 'id', alias: 'Task ID', dataType: 'string' },
            { id: 'mnemonic', alias: 'Mnemonic', dataType: 'string' },
            { id: 'title', alias: 'Title', dataType: 'string' },
            { id: 'projectId', alias: 'Project ID', dataType: 'string' },
            { id: 'projectName', alias: 'Project', dataType: 'string' },
            { id: 'sprintName', alias: 'Sprint', dataType: 'string' },
            { id: 'epicName', alias: 'Epic', dataType: 'string' },
            { id: 'assigneeName', alias: 'Assignee', dataType: 'string' },
            { id: 'status', alias: 'Status', dataType: 'string' },
            { id: 'priority', alias: 'Priority', dataType: 'string' },
            { id: 'storyPoints', alias: 'Story Points', dataType: 'int' },
            { id: 'plannedValue', alias: 'Planned Value', dataType: 'float' },
            { id: 'actualCost', alias: 'Actual Cost', dataType: 'float' },
            { id: 'earnedValue', alias: 'Earned Value', dataType: 'float' },
            { id: 'progress', alias: 'Progress', dataType: 'int' },
            { id: 'startDate', alias: 'Start Date', dataType: 'datetime' },
            { id: 'endDate', alias: 'End Date', dataType: 'datetime' },
            { id: 'createdAt', alias: 'Created At', dataType: 'datetime' },
            { id: 'updatedAt', alias: 'Updated At', dataType: 'datetime' }
          ]
        },
        sprints: {
          alias: 'Sync Sprints',
          columns: [
            { id: 'id', alias: 'Sprint ID', dataType: 'string' },
            { id: 'name', alias: 'Name', dataType: 'string' },
            { id: 'goal', alias: 'Sprint Goal', dataType: 'string' },
            { id: 'projectId', alias: 'Project ID', dataType: 'string' },
            { id: 'projectName', alias: 'Project', dataType: 'string' },
            { id: 'state', alias: 'State', dataType: 'string' },
            { id: 'capacity', alias: 'Capacity', dataType: 'int' },
            { id: 'velocityActual', alias: 'Velocity Actual', dataType: 'int' },
            { id: 'startDate', alias: 'Start Date', dataType: 'datetime' },
            { id: 'endDate', alias: 'End Date', dataType: 'datetime' },
            { id: 'startedAt', alias: 'Started At', dataType: 'datetime' },
            { id: 'endedAt', alias: 'Ended At', dataType: 'datetime' },
            { id: 'reviewedAt', alias: 'Reviewed At', dataType: 'datetime' }
          ]
        },
        risks: {
          alias: 'Sync Risks',
          columns: [
            { id: 'id', alias: 'Risk ID', dataType: 'string' },
            { id: 'projectId', alias: 'Project ID', dataType: 'string' },
            { id: 'projectName', alias: 'Project', dataType: 'string' },
            { id: 'title', alias: 'Title', dataType: 'string' },
            { id: 'probability', alias: 'Probability', dataType: 'int' },
            { id: 'impact', alias: 'Impact', dataType: 'int' },
            { id: 'score', alias: 'Score', dataType: 'int' },
            { id: 'severity', alias: 'Severity', dataType: 'string' },
            { id: 'status', alias: 'Status', dataType: 'string' },
            { id: 'ownerName', alias: 'Owner', dataType: 'string' },
            { id: 'source', alias: 'Source', dataType: 'string' },
            { id: 'detectedAt', alias: 'Detected At', dataType: 'datetime' },
            { id: 'closedAt', alias: 'Closed At', dataType: 'datetime' },
            { id: 'createdAt', alias: 'Created At', dataType: 'datetime' },
            { id: 'updatedAt', alias: 'Updated At', dataType: 'datetime' }
          ]
        },
        audit: {
          alias: 'Sync Audit',
          columns: [
            { id: 'id', alias: 'Event ID', dataType: 'string' },
            { id: 'action', alias: 'Action', dataType: 'string' },
            { id: 'entityType', alias: 'Entity Type', dataType: 'string' },
            { id: 'entityId', alias: 'Entity ID', dataType: 'string' },
            { id: 'actorId', alias: 'Actor ID', dataType: 'string' },
            { id: 'actorName', alias: 'Actor', dataType: 'string' },
            { id: 'ipAddress', alias: 'IP Address', dataType: 'string' },
            { id: 'createdAt', alias: 'Created At', dataType: 'datetime' }
          ]
        }
      };

      // Cap defensivo de páginas — evita loops infinitos por bug server.
      // 200 páginas × 5000 filas = 1M filas máximo por extract Tableau.
      var MAX_PAGES = 200;

      // ─────────────────────────────────────────────────────────────
      // Connector definition.
      // ─────────────────────────────────────────────────────────────
      var myConnector = tableau.makeConnector();

      myConnector.getSchema = function (schemaCallback) {
        var cfg = parseConnectionData(tableau.connectionData);
        var dataset = cfg && cfg.dataset ? cfg.dataset : 'projects';
        var schema = DATASET_SCHEMAS[dataset];
        if (!schema) {
          tableau.abortWithError('Dataset inválido: ' + dataset);
          return;
        }
        schemaCallback([
          {
            id: dataset,
            alias: schema.alias,
            columns: schema.columns
          }
        ]);
      };

      myConnector.getData = function (table, doneCallback) {
        var cfg = parseConnectionData(tableau.connectionData);
        if (!cfg) {
          tableau.abortWithError('connectionData inválida o vacía.');
          return;
        }
        var dataset = table.tableInfo.id;
        var schema = DATASET_SCHEMAS[dataset];
        if (!schema) {
          tableau.abortWithError('Dataset no soportado: ' + dataset);
          return;
        }

        var endpoint = cfg.baseUrl.replace(/\/$/, '') +
          '/api/integrations/tableau/' + dataset;
        var pagesFetched = 0;

        function fetchPage(cursor) {
          if (pagesFetched >= MAX_PAGES) {
            tableau.log(
              '[Sync WDC] Cap de páginas alcanzado (' + MAX_PAGES + ').'
            );
            doneCallback();
            return;
          }
          pagesFetched += 1;

          var url = endpoint;
          if (cursor) {
            url += (url.indexOf('?') === -1 ? '?' : '&') +
                   'cursor=' + encodeURIComponent(cursor);
          }

          var xhr = new XMLHttpRequest();
          xhr.open('GET', url, true);
          xhr.setRequestHeader('Authorization', 'Bearer ' + cfg.apiKey);
          xhr.setRequestHeader('Accept', 'application/json');
          xhr.onreadystatechange = function () {
            if (xhr.readyState !== 4) return;
            if (xhr.status < 200 || xhr.status >= 300) {
              tableau.abortWithError(
                'Fetch ' + dataset + ' falló: HTTP ' + xhr.status +
                ' — ' + xhr.responseText
              );
              return;
            }
            var payload;
            try {
              payload = JSON.parse(xhr.responseText);
            } catch (e) {
              tableau.abortWithError(
                'Respuesta no es JSON válido: ' + e.message
              );
              return;
            }
            if (!payload || !Array.isArray(payload.rows)) {
              tableau.abortWithError(
                'Shape inesperado: falta payload.rows array.'
              );
              return;
            }
            table.appendRows(payload.rows);
            if (payload.nextCursor) {
              fetchPage(payload.nextCursor);
            } else {
              doneCallback();
            }
          };
          xhr.onerror = function () {
            tableau.abortWithError(
              'Error de red al consultar ' + url
            );
          };
          xhr.send();
        }

        fetchPage(null);
      };

      tableau.registerConnector(myConnector);

      // ─────────────────────────────────────────────────────────────
      // UI helpers.
      // ─────────────────────────────────────────────────────────────
      function parseConnectionData(raw) {
        if (!raw) return null;
        try {
          var parsed = JSON.parse(raw);
          if (!parsed.apiKey || !parsed.dataset || !parsed.baseUrl) return null;
          return parsed;
        } catch (e) {
          return null;
        }
      }

      function showStatus(message, kind) {
        var el = document.getElementById('status');
        el.textContent = message;
        el.className = 'status ' + kind;
      }

      function bindSubmit() {
        var btn = document.getElementById('submitButton');
        btn.addEventListener('click', function () {
          var apiKey = document.getElementById('apiKey').value.trim();
          var dataset = document.getElementById('dataset').value;
          var baseUrlInput = document.getElementById('baseUrl').value.trim();
          var baseUrl = baseUrlInput || window.location.origin;

          if (!apiKey) {
            showStatus(
              'Falta el API key Bearer (scope read:exports).',
              'error'
            );
            return;
          }
          if (!DATASET_SCHEMAS[dataset]) {
            showStatus('Dataset inválido: ' + dataset, 'error');
            return;
          }

          tableau.connectionData = JSON.stringify({
            apiKey: apiKey,
            dataset: dataset,
            baseUrl: baseUrl
          });
          tableau.connectionName = 'Sync · ' + DATASET_SCHEMAS[dataset].alias;
          showStatus('Enviando a Tableau...', 'ok');
          tableau.submit();
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', bindSubmit);
      } else {
        bindSubmit();
      }
    })();
  </script>
</body>
</html>
