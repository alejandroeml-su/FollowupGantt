<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Kanban · FollowupGantt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="min-h-screen">
  <div id="nav"></div>

  <main class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold">Tablero Kanban</h1>
        <p class="text-sm text-gray-500">Drag &amp; drop · WIP limits · sincronía con Gantt</p>
      </div>
      <button id="new-task-btn" class="px-4 py-2 rounded-lg bg-blue-600 text-white font-medium hover:bg-blue-700">+ Nueva tarea</button>
    </div>

    <div id="board" class="flex gap-4 overflow-x-auto pb-4"></div>
  </main>

  <!-- Modal nueva tarea -->
  <div id="modal" class="hidden fixed inset-0 z-50 modal-backdrop items-center justify-center p-4">
    <div class="bg-white rounded-xl w-full max-w-lg p-6 shadow-xl">
      <h3 class="text-lg font-semibold mb-4">Nueva tarea</h3>
      <form id="task-form" class="space-y-3">
        <input name="title" placeholder="Título" class="w-full border rounded-lg px-3 py-2" required>
        <textarea name="description" placeholder="Descripción" class="w-full border rounded-lg px-3 py-2"></textarea>
        <div class="grid grid-cols-2 gap-3">
          <select name="type" class="border rounded-lg px-3 py-2">
            <option value="task">Task</option><option value="story">Story</option>
            <option value="bug">Bug</option><option value="milestone">Milestone</option>
          </select>
          <select name="priority" class="border rounded-lg px-3 py-2">
            <option value="low">Low</option><option value="medium" selected>Medium</option>
            <option value="high">High</option><option value="critical">Critical</option>
          </select>
          <input name="story_points" type="number" step="0.5" placeholder="Story Points" class="border rounded-lg px-3 py-2">
          <input name="due_date" type="date" class="border rounded-lg px-3 py-2">
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button type="button" id="cancel-btn" class="px-4 py-2 rounded-lg border">Cancelar</button>
          <button type="submit" class="px-4 py-2 rounded-lg bg-blue-600 text-white">Crear</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    document.getElementById('nav').innerHTML = renderTopNav('kanban');

    let board = [];

    function taskCard(t) {
      const typeColor = { epic: 'bg-purple-100 text-purple-700', story: 'bg-blue-100 text-blue-700', task: 'bg-gray-100 text-gray-700', bug: 'bg-red-100 text-red-700', milestone: 'bg-amber-100 text-amber-700', ticket: 'bg-emerald-100 text-emerald-700' };
      return `
        <div class="kanban-card bg-white rounded-lg p-3 border border-gray-200 shadow-sm" draggable="true" data-id="${t.id}">
          <div class="flex items-center justify-between mb-2">
            <span class="text-xs px-2 py-0.5 rounded ${typeColor[t.type] || typeColor.task}">${t.type || 'task'}</span>
            ${priorityBadge(t.priority || 'medium')}
          </div>
          <div class="font-medium text-sm text-gray-900">${escapeHtml(t.title)}</div>
          <div class="mt-2 flex items-center justify-between text-xs text-gray-500">
            <span>${t.story_points ? t.story_points + ' SP' : ''}</span>
            <span>${t.due_date ? fmt(t.due_date) : ''}</span>
          </div>
          ${t.progress > 0 ? `
            <div class="mt-2 h-1 bg-gray-100 rounded-full overflow-hidden">
              <div class="h-full bg-blue-500" style="width:${t.progress}%"></div>
            </div>` : ''}
        </div>
      `;
    }

    function render() {
      document.getElementById('board').innerHTML = board.map(col => `
        <div class="kanban-column w-72 shrink-0 rounded-xl border border-gray-200 bg-gray-50 ${col.wip_exceeded ? 'wip-exceeded' : ''}"
             data-col="${col.id}">
          <div class="col-header p-3 border-b bg-white rounded-t-xl flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="w-3 h-3 rounded-full" style="background:${col.color || '#3B82F6'}"></span>
              <span class="font-semibold text-sm">${escapeHtml(col.name)}</span>
              <span class="text-xs text-gray-500">${(col.items || []).length}${col.wip_limit ? ' / ' + col.wip_limit : ''}</span>
            </div>
            ${col.wip_exceeded ? '<span class="text-xs text-red-600 font-semibold animate-pulse-soft">WIP ⚠</span>' : ''}
          </div>
          <div class="p-2 space-y-2" data-col-body="${col.id}">
            ${(col.items || []).map(taskCard).join('')}
          </div>
        </div>
      `).join('');

      attachDnD();
    }

    function attachDnD() {
      document.querySelectorAll('.kanban-card').forEach(card => {
        card.addEventListener('dragstart', (e) => {
          card.classList.add('dragging');
          e.dataTransfer.setData('text/plain', card.dataset.id);
        });
        card.addEventListener('dragend', () => card.classList.remove('dragging'));
      });
      document.querySelectorAll('.kanban-column').forEach(col => {
        col.addEventListener('dragover', (e) => { e.preventDefault(); col.classList.add('drag-over'); });
        col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
        col.addEventListener('drop', async (e) => {
          e.preventDefault();
          col.classList.remove('drag-over');
          const taskId = e.dataTransfer.getData('text/plain');
          const targetCol = col.dataset.col;
          try {
            await api.tasks.move(taskId, targetCol, 0);
            await load();
          } catch (err) {
            // Fallback en modo demo: mover en memoria
            board.forEach(c => { c.items = (c.items || []).filter(t => t.id !== taskId); });
            const moved = findTask(taskId);
            const dst = board.find(c => c.id === targetCol);
            if (moved && dst) { dst.items.unshift(moved); render(); }
          }
        });
      });
    }

    function findTask(id) {
      for (const c of board) for (const t of c.items || []) if (t.id === id) return t;
      return null;
    }

    async function load() {
      if (!AppState.currentProjectId) { await AppState.init(); }
      board = await api.kanban.board(AppState.currentProjectId).catch(() => []);
      if (!board.length) board = await api.kanban.board('demo-1').catch(() => []);
      render();
    }

    // Modal
    const modal = document.getElementById('modal');
    document.getElementById('new-task-btn').addEventListener('click', () => modal.classList.remove('hidden'));
    document.getElementById('cancel-btn').addEventListener('click', () => modal.classList.add('hidden'));
    document.getElementById('task-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const body = Object.fromEntries(fd.entries());
      body.project_id = AppState.currentProjectId;
      const firstCol = board[0];
      if (firstCol) body.column_id = firstCol.id;
      try {
        await api.tasks.create(body);
        modal.classList.add('hidden');
        e.target.reset();
        await load();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    });

    (async () => {
      await AppState.init();
      await load();
    })();
  </script>
</body>
</html>
