# EPIC-001 · @SRE · Manifiestos base Kubernetes
apiVersion: apps/v1
kind: Deployment
metadata:
  name: followup-gantt
  labels:
    app: followup-gantt
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels: { app: followup-gantt }
  template:
    metadata:
      labels: { app: followup-gantt }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: web
          image: ghcr.io/avante/followup-gantt:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef: { name: followup-gantt-secrets }
            - configMapRef: { name: followup-gantt-config }
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { cpu: 1000m, memory: 768Mi }
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
---
apiVersion: v1
kind: Service
metadata:
  name: followup-gantt
spec:
  type: ClusterIP
  selector: { app: followup-gantt }
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: followup-gantt
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: followup-gantt
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
