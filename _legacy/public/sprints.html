<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Sprints · FollowupGantt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="min-h-screen">
  <div id="nav"></div>
  <main class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold">Sprints</h1>
      <button id="new-sprint-btn" class="px-4 py-2 rounded-lg bg-blue-600 text-white">+ Nuevo sprint</button>
    </div>
    <div id="sprints-list" class="space-y-3"></div>
  </main>

  <div id="modal" class="hidden fixed inset-0 z-50 modal-backdrop items-center justify-center p-4">
    <div class="bg-white rounded-xl w-full max-w-lg p-6 shadow-xl">
      <h3 class="text-lg font-semibold mb-4">Nuevo sprint</h3>
      <form id="sprint-form" class="space-y-3">
        <input name="name" placeholder="Nombre" class="w-full border rounded-lg px-3 py-2" required>
        <textarea name="goal" placeholder="Sprint Goal" class="w-full border rounded-lg px-3 py-2"></textarea>
        <div class="grid grid-cols-2 gap-3">
          <input name="start_date" type="date" class="border rounded-lg px-3 py-2" required>
          <input name="end_date" type="date" class="border rounded-lg px-3 py-2" required>
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button type="button" id="cancel-btn" class="px-4 py-2 rounded-lg border">Cancelar</button>
          <button type="submit" class="px-4 py-2 rounded-lg bg-blue-600 text-white">Crear</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    document.getElementById('nav').innerHTML = renderTopNav('sprints');

    async function load() {
      const sprints = await api.sprints.list(AppState.currentProjectId).catch(() => []);
      const list = document.getElementById('sprints-list');
      if (!sprints.length) {
        list.innerHTML = '<div class="bg-white rounded-xl border p-6 text-center text-gray-500">Sin sprints. Crea el primero.</div>';
        return;
      }
      list.innerHTML = sprints.map(s => `
        <div class="bg-white rounded-xl border p-5 flex items-center justify-between">
          <div>
            <div class="flex items-center gap-2">
              <h3 class="font-semibold">${escapeHtml(s.name)}</h3>
              ${statusBadge(s.status)}
            </div>
            <p class="text-sm text-gray-600 mt-1">${escapeHtml(s.goal || '')}</p>
            <div class="text-xs text-gray-400 mt-1">${fmt(s.start_date)} → ${fmt(s.end_date)}</div>
          </div>
          <div class="text-right text-sm">
            <div class="text-gray-500">Velocity</div>
            <div class="text-xl font-bold">${s.velocity || 0}</div>
          </div>
        </div>
      `).join('');
    }

    const modal = document.getElementById('modal');
    document.getElementById('new-sprint-btn').addEventListener('click', () => modal.classList.remove('hidden'));
    document.getElementById('cancel-btn').addEventListener('click', () => modal.classList.add('hidden'));
    document.getElementById('sprint-form').addEventListener('submit', async e => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const body = Object.fromEntries(fd.entries());
      body.project_id = AppState.currentProjectId;
      try {
        await api.sprints.create(body);
        modal.classList.add('hidden'); e.target.reset();
        await load();
      } catch (err) { alert(err.message); }
    });

    (async () => { await AppState.init(); await load(); })();
  </script>
</body>
</html>
