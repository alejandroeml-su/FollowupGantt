# EPIC-001 · @SRE · Pipeline CI
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx prisma generate
      - run: npm run lint
      - run: npx tsc --noEmit

  unit:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    needs: lint-type
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx prisma generate
      - run: npx vitest run --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  e2e:
    name: Playwright E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: lint-type
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: followup
          POSTGRES_PASSWORD: followup_dev
          POSTGRES_DB: followup_test
        options: >-
          --health-cmd="pg_isready -U followup"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports: ["5432:5432"]
    env:
      DATABASE_URL: postgresql://followup:followup_dev@localhost:5432/followup_test?schema=public
      DIRECT_URL:   postgresql://followup:followup_dev@localhost:5432/followup_test?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm install -g tsx
      # En tests usamos `db push` (idempotente, no requiere migración baseline)
      # para crear el schema desde prisma/schema.prisma directamente.
      - run: npx prisma db push --accept-data-loss
      - run: tsx prisma/seed.ts
      - run: npm run build
      - name: Start Next.js
        run: |
          npm run start &
          echo $! > .next-pid
          npx wait-on http://localhost:3000/api/health --timeout 60000
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: npx playwright test --project=${{ matrix.browser }}
      - name: Stop Next.js
        if: always()
        run: kill $(cat .next-pid) 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/

  a11y:
    name: Accessibility (axe-core)
    runs-on: ubuntu-latest
    needs: lint-type
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: followup
          POSTGRES_PASSWORD: followup_dev
          POSTGRES_DB: followup_test
        options: >-
          --health-cmd="pg_isready -U followup"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports: ["5432:5432"]
    env:
      DATABASE_URL: postgresql://followup:followup_dev@localhost:5432/followup_test?schema=public
      DIRECT_URL:   postgresql://followup:followup_dev@localhost:5432/followup_test?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm install -g tsx
      - run: npx prisma db push --accept-data-loss
      - run: tsx prisma/seed.ts
      - run: npm run build
      - name: Start Next.js
        run: |
          npm run start &
          echo $! > .next-pid
          npx wait-on http://localhost:3000/api/health --timeout 60000
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test tests/a11y --project=chromium
      - name: Stop Next.js
        if: always()
        run: kill $(cat .next-pid) 2>/dev/null || true

  docker:
    name: Docker build + Trivy scan
    runs-on: ubuntu-latest
    needs: [unit, e2e]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker build -t followup-gantt:${{ github.sha }} .
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: followup-gantt:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
