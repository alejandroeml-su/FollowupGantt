# Mirror `master` automáticamente al fork `edwinaml-su/FollowupGantt`.
#
# Existe porque los merges admin de PRs ocurren del lado de
# `alejandroeml-su` y los squash commits NO se propagan vía la config
# `git push` dual local (sólo dispara desde la máquina de Edwin). Resultado
# del incidente 2026-05-17: `followup-gantt.vercel.app` (deploy desde
# `edwinaml-su`) quedó 8 PRs atrás de `followup-gantt-beta.vercel.app`
# hasta sync manual.
#
# Setup requerido (1 sola vez):
#   1. Crear un PAT (classic) en la cuenta `edwinaml-su` con scope `repo`.
#      https://github.com/settings/tokens → Generate new token (classic).
#      Recomendado: expiración 1 año, descripción "Mirror sync from
#      alejandroeml-su/FollowupGantt".
#   2. En este repo (`alejandroeml-su/FollowupGantt`) ir a
#      Settings → Secrets and variables → Actions → New repository secret.
#      Name: `EDWINAML_SU_MIRROR_PAT`. Value: el token del paso 1.
#   3. Mergear este PR. El primer push a master tras el merge dispara la
#      acción y deja edwinaml-su sincronizado.
#
# Seguridad:
#   - El workflow sólo se ejecuta cuando el repo es `alejandroeml-su/FollowupGantt`
#     (evita propagación accidental si alguien hace fork).
#   - Sólo mirror de master (no de feature branches — sería ruido).
#   - Fast-forward only: si edwinaml-su está adelante por alguna razón,
#     el push falla y notifica en lugar de force-push silente.

name: Mirror master to edwinaml-su

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: mirror-edwinaml-su
  cancel-in-progress: false

jobs:
  mirror:
    name: Push master to edwinaml-su/FollowupGantt
    runs-on: ubuntu-latest
    if: github.repository == 'alejandroeml-su/FollowupGantt'
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Mirror push (fast-forward only)
        env:
          MIRROR_PAT: ${{ secrets.EDWINAML_SU_MIRROR_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${MIRROR_PAT:-}" ]; then
            echo "::error::EDWINAML_SU_MIRROR_PAT secret no está configurado. Revisa el header del workflow para el setup."
            exit 1
          fi
          # Username 'edwinaml-su' (no 'x-access-token'). El placeholder
          # 'x-access-token' solo funciona con GitHub App installation tokens
          # y classic PATs; los fine-grained PATs requieren el username real
          # del owner del token o GitHub responde "Repository not found" 404.
          git remote add mirror "https://edwinaml-su:${MIRROR_PAT}@github.com/edwinaml-su/FollowupGantt.git"
          echo "Pusheando master ($(git rev-parse --short HEAD)) a edwinaml-su/FollowupGantt…"
          git push mirror master
          echo "✅ Sincronizado."
