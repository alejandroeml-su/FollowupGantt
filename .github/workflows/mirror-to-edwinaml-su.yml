# Mirror `master` automáticamente al fork `edwinaml-su/FollowupGantt`.
#
# Existe porque los merges admin de PRs ocurren del lado de
# `alejandroeml-su` y los squash commits NO se propagan vía la config
# `git push` dual local (sólo dispara desde la máquina de Edwin). Resultado
# del incidente 2026-05-17: `followup-gantt.vercel.app` (deploy desde
# `edwinaml-su`) quedó 8 PRs atrás de `followup-gantt-beta.vercel.app`
# hasta sync manual.
#
# Setup requerido (1 sola vez):
#   1. Crear un PAT (classic) en la cuenta `edwinaml-su` con scope `repo`.
#      https://github.com/settings/tokens → Generate new token (classic).
#      Recomendado: expiración 1 año, descripción "Mirror sync from
#      alejandroeml-su/FollowupGantt".
#   2. En este repo (`alejandroeml-su/FollowupGantt`) ir a
#      Settings → Secrets and variables → Actions → New repository secret.
#      Name: `EDWINAML_SU_MIRROR_PAT`. Value: el token del paso 1.
#   3. Mergear este PR. El primer push a master tras el merge dispara la
#      acción y deja edwinaml-su sincronizado.
#
# Seguridad:
#   - El workflow sólo se ejecuta cuando el repo es `alejandroeml-su/FollowupGantt`
#     (evita propagación accidental si alguien hace fork).
#   - Sólo mirror de master (no de feature branches — sería ruido).
#   - Fast-forward only: si edwinaml-su está adelante por alguna razón,
#     el push falla y notifica en lugar de force-push silente.

name: Mirror master to edwinaml-su

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: mirror-edwinaml-su
  cancel-in-progress: false

jobs:
  mirror:
    name: Push master to edwinaml-su/FollowupGantt
    runs-on: ubuntu-latest
    if: github.repository == 'alejandroeml-su/FollowupGantt'
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Verify PAT auth before push (diagnostic)
        env:
          MIRROR_PAT: ${{ secrets.EDWINAML_SU_MIRROR_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${MIRROR_PAT:-}" ]; then
            echo "::error::EDWINAML_SU_MIRROR_PAT secret no está configurado."
            exit 1
          fi
          echo "PAT length: ${#MIRROR_PAT} chars"
          echo "PAT prefix: ${MIRROR_PAT:0:11}…"
          echo ""
          echo "→ GET /repos/edwinaml-su/FollowupGantt"
          HTTP_CODE=$(curl -s -o /tmp/repo.json -w "%{http_code}" -H "Authorization: Bearer ${MIRROR_PAT}" https://api.github.com/repos/edwinaml-su/FollowupGantt)
          echo "   HTTP ${HTTP_CODE}"
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::PAT no puede leer metadata del repo. Revisar scopes (Metadata: Read) y owner del PAT."
            cat /tmp/repo.json
            exit 1
          fi
          echo "→ GET /repos/edwinaml-su/FollowupGantt/git/refs/heads/master (requiere Contents:read)"
          HTTP_CODE=$(curl -s -o /tmp/ref.json -w "%{http_code}" -H "Authorization: Bearer ${MIRROR_PAT}" https://api.github.com/repos/edwinaml-su/FollowupGantt/git/refs/heads/master)
          echo "   HTTP ${HTTP_CODE}"
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::PAT no puede leer refs/Contents. Confirma 'Contents: Read and Write' en el fine-grained PAT."
            cat /tmp/ref.json
            exit 1
          fi
          echo "→ PATCH /repos/edwinaml-su/FollowupGantt (test Contents:write con un campo benigno)"
          ORIGINAL_DESC=$(jq -r '.description // ""' /tmp/repo.json)
          echo "   description original: '${ORIGINAL_DESC}'"
          HTTP_CODE=$(curl -s -o /tmp/patch.json -w "%{http_code}" -X PATCH -H "Authorization: Bearer ${MIRROR_PAT}" -H "Accept: application/vnd.github+json" -d "{\"description\":\"${ORIGINAL_DESC}\"}" https://api.github.com/repos/edwinaml-su/FollowupGantt)
          echo "   HTTP ${HTTP_CODE}"
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::PAT NO TIENE write access. Esta es la causa real del fallo del push."
            echo "Body:"
            cat /tmp/patch.json
            echo ""
            echo "Fix: en el fine-grained PAT, en 'Repository permissions' debe estar:"
            echo "  - Contents: Read and Write"
            echo "  - Workflows: Read and Write (sólo si el push incluye .github/workflows/*)"
            exit 1
          fi
          echo "✅ PAT tiene Contents:write. Procediendo al push."

      - name: Mirror push (fast-forward only)
        env:
          MIRROR_PAT: ${{ secrets.EDWINAML_SU_MIRROR_PAT }}
        run: |
          set -euo pipefail
          # Approach canónico: gh auth setup-git configura el credential
          # helper de git con el PAT actual. Funciona uniforme con classic +
          # fine-grained, sin gymnastics de username en URL.
          echo "${MIRROR_PAT}" | gh auth login --with-token
          gh auth setup-git
          git remote add mirror https://github.com/edwinaml-su/FollowupGantt.git
          echo "Pusheando master ($(git rev-parse --short HEAD)) a edwinaml-su/FollowupGantt…"
          git push mirror master
          echo "✅ Sincronizado."
